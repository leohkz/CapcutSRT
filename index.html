<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapcutSRT - Export Subtitles from CapCut</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='20' width='80' height='60' rx='8' fill='none' stroke='%238B5CF6' stroke-width='8'/%3E%3Cpath d='M25 55 H75 M25 68 H55' stroke='%238B5CF6' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col items-center p-4 md:p-8 relative min-h-screen">

<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="blob bg-violet-600 w-96 h-96 top-0 left-1/4 mix-blend-screen animate-pulse"></div>
  <div class="blob bg-purple-700 w-96 h-96 top-1/3 right-1/4 mix-blend-screen animate-pulse" style="animation-delay:2s"></div>
  <div class="blob bg-fuchsia-600 w-80 h-80 bottom-0 left-1/3 mix-blend-screen animate-pulse" style="animation-delay:4s"></div>
</div>

<div class="fixed top-4 right-4 z-50 flex gap-1 glass-panel rounded-xl p-1">
  <button class="lang-btn active px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="en">EN</button>
  <button class="lang-btn px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="zh-TW">繁體</button>
  <button class="lang-btn px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="zh-CN">简体</button>
</div>

<main class="w-full max-w-4xl flex flex-col gap-8 z-10 mt-4">

  <header class="text-center space-y-4">
    <div class="inline-flex items-center justify-center p-4 rounded-2xl glass-panel mb-2 mx-auto">
      <svg class="w-12 h-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="18" width="84" height="64" rx="10" stroke="#8B5CF6" stroke-width="8"/>
        <path d="M22 52 H78" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/>
        <path d="M22 66 H54" stroke="#a78bfa" stroke-width="6" stroke-linecap="round"/>
        <circle cx="74" cy="35" r="10" fill="#EF4444"/>
        <path d="M70 35 L72 38 L78 32" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="ml-4 text-left">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400">CapcutSRT</h1>
        <p class="text-xs text-slate-400 tracking-wider uppercase" data-i18n="tagline"></p>
      </div>
    </div>
    <p class="text-slate-300 max-w-xl mx-auto leading-relaxed" data-i18n="desc"></p>
  </header>

  <div id="os-guide" class="glass-panel rounded-2xl p-5 fade-in-up">
    <div class="flex items-start gap-4">
      <div id="os-icon" class="text-3xl shrink-0 mt-0.5"></div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-violet-300 mb-1" data-i18n="osGuideTitle"></p>
        <p class="text-xs text-slate-400 mb-2" data-i18n="osGuideSub"></p>
        <div id="os-path" class="code-block"></div>
        <p class="text-xs text-slate-500 mt-2" data-i18n="osGuideNote"></p>
      </div>
    </div>
  </div>

  <div id="drop-zone" class="drop-zone rounded-2xl p-8 md:p-12 text-center cursor-pointer group relative select-none">
    <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"
           accept=".json,.srt,.txt,application/json,text/plain" multiple>
    <div class="relative z-10 pointer-events-none flex flex-col items-center gap-4">
      <div class="p-4 bg-slate-800/50 rounded-full border border-slate-700 group-hover:border-violet-500 group-hover:bg-slate-800 transition-all">
        <svg class="w-8 h-8 text-slate-300 group-hover:text-violet-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
      </div>
      <div>
        <p class="text-lg font-semibold text-white mb-1" data-i18n="dropTitle"></p>
        <p class="text-sm text-slate-400" data-i18n="dropSub"></p>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-slate-800/80 rounded-full border border-slate-700">
        <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-xs text-slate-300" data-i18n="dropHint"></span>
      </div>
    </div>
  </div>

  <!-- Batch file info bar (hidden when single file) -->
  <div id="batch-bar" class="hidden glass-panel rounded-xl px-4 py-3 flex items-start gap-3">
    <svg class="w-4 h-4 text-violet-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold text-violet-300 mb-1" id="batch-title"></p>
      <div id="batch-file-list" class="flex flex-wrap gap-1"></div>
    </div>
  </div>

  <div id="tools-panel" class="hidden glass-panel rounded-2xl p-6">
    <h2 class="text-sm font-semibold text-slate-300 mb-5 flex items-center gap-2">
      <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
      <span data-i18n="advancedTools"></span>
    </h2>
    <div class="grid md:grid-cols-2 gap-6">

      <div class="space-y-5">
        <div>
          <div class="flex items-center justify-between mb-2">
            <div><p class="text-sm text-white" data-i18n="deleteParticles"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="deleteParticlesSub"></p></div>
            <label class="toggle-switch"><input type="checkbox" id="toggle-particles" checked><span class="toggle-slider"></span></label>
          </div>
          <div id="particle-picker" class="particle-chips"></div>
          <div class="flex gap-2 mt-2">
            <input id="particle-add-input" type="text" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-xs text-white focus:outline-none focus:border-violet-500" autocomplete="off">
            <button id="particle-add-btn" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-xs transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <div><p class="text-sm text-white" data-i18n="removeEmpty"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="removeEmptySub"></p></div>
          <label class="toggle-switch"><input type="checkbox" id="toggle-empty" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="flex items-center justify-between">
          <div><p class="text-sm text-white" data-i18n="mergeSame"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="mergeSameSub"></p></div>
          <label class="toggle-switch"><input type="checkbox" id="toggle-merge"><span class="toggle-slider"></span></label>
        </div>
        <div>
          <p class="text-sm text-white mb-2" data-i18n="timeOffset"></p>
          <div class="flex items-center gap-2">
            <input type="number" id="time-offset" value="0" step="0.1" class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-violet-500">
            <span class="text-xs text-slate-400" data-i18n="seconds"></span>
          </div>
        </div>
        <div>
          <p class="text-sm text-white mb-1" data-i18n="longSubDetect"></p>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs text-slate-400" data-i18n="longSubDetectSub"></span>
            <input type="number" id="long-sub-threshold" value="8" min="1" step="0.5" class="w-20 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-sm text-white focus:outline-none focus:border-violet-500">
            <span class="text-xs text-slate-400" data-i18n="longSubSeconds"></span>
          </div>
          <div class="flex items-center gap-2 mt-2">
            <label class="toggle-switch"><input type="checkbox" id="toggle-show-only-long"><span class="toggle-slider"></span></label>
            <span class="text-xs text-slate-400" data-i18n="showOnlyLong"></span>
          </div>
        </div>
        <div>
          <p class="text-sm text-white mb-2" data-i18n="zhConvert"></p>
          <select id="zh-convert-select" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-violet-500 cursor-pointer">
            <option value="none"></option>
            <option value="s2t"></option>
            <option value="t2s"></option>
          </select>
        </div>
      </div>

      <div>
        <p class="text-sm text-white mb-3" data-i18n="textReplace"></p>
        <div id="replace-list" class="space-y-2 mb-3"></div>
        <button id="add-replace-btn" class="text-xs text-violet-400 hover:text-violet-300 flex items-center gap-1 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span data-i18n="addRule"></span>
        </button>
      </div>

    </div>
  </div>

  <div id="results-panel" class="hidden flex-col gap-4 fade-in-up">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
      <div class="text-sm text-slate-400 flex items-center gap-1 flex-wrap">
        <input id="filename-input" type="text" class="filename-input" placeholder="subtitles" autocomplete="off" spellcheck="false">
        <span class="text-slate-600 select-none">&nbsp;&middot;&nbsp;</span>
        <span id="subtitle-count" class="text-white font-bold">0</span>
        <span data-i18n="subtitleLines"></span>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="exportFile('srt')" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5 shadow-lg shadow-violet-900/40">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          <span data-i18n="exportSRT"></span>
        </button>
        <button onclick="exportFile('txt')" class="px-4 py-2 bg-fuchsia-600 hover:bg-fuchsia-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5 shadow-lg shadow-fuchsia-900/40">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          <span data-i18n="exportTXT"></span>
        </button>
        <button onclick="exportFile('plain')" class="px-4 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          <span data-i18n="exportPlain"></span>
        </button>
        <button onclick="copyAllSubs()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <span data-i18n="copyAll"></span>
        </button>
        <button onclick="clearAll()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-medium transition-all active:scale-95">
          <span data-i18n="clearAll"></span>
        </button>
      </div>
    </div>
    <div class="glass-panel rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700/50">
        <span class="text-xs font-medium text-slate-400" data-i18n="preview"></span>
        <span class="text-xs text-slate-500" data-i18n="previewNote"></span>
      </div>
      <div id="preview-list" class="divide-y divide-slate-700/30 max-h-[55vh] overflow-y-auto"></div>
    </div>
  </div>

  <div id="error-msg" class="hidden glass-panel bg-red-900/20 border-red-500/30 px-5 py-4 rounded-xl text-sm flex items-start gap-3 text-red-200">
    <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div>
      <strong class="block mb-1" data-i18n="errorTitle"></strong>
      <span id="error-text" class="opacity-90"></span>
    </div>
  </div>

</main>

<footer class="mt-12 mb-6 text-center w-full text-slate-600 text-xs z-10">
  <p>CapcutSRT &bull; Client-side Only &bull; Zero Upload &bull; <a href="https://github.com/leohkz/CapcutSRT" class="hover:text-slate-400 transition-colors">GitHub</a></p>
</footer>

<script src="js/i18n.js"></script>
<script src="js/parsers.js"></script>
<script src="js/tools.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
