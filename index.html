<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapcutSRT - Subtitle Editor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='20' width='80' height='60' rx='8' fill='none' stroke='%238B5CF6' stroke-width='8'/%3E%3Cpath d='M25 55 H75 M25 68 H55' stroke='%238B5CF6' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
body{font-family:'Inter','Helvetica Neue',sans-serif;background-color:#0f172a;background-image:radial-gradient(at 0% 0%,hsla(253,16%,7%,1) 0,transparent 50%),radial-gradient(at 50% 0%,hsla(262,39%,30%,1) 0,transparent 50%),radial-gradient(at 100% 0%,hsla(300,49%,25%,1) 0,transparent 50%);color:#e2e8f0;min-height:100vh;}
.font-mono{font-family:'JetBrains Mono','Fira Code',monospace;}
.glass-panel{background:rgba(30,41,59,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
.drop-zone{background-image:url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23475569FF' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;}
.drop-zone.drag-over{background-color:rgba(139,92,246,0.15);background-image:url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%238B5CF6FF' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");transform:scale(1.01);}
.fade-in-up{animation:fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;transform:translateY(20px);}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;z-index:-1;}
.lang-btn{transition:all 0.2s;}
.lang-btn.active{background:rgba(139,92,246,0.3);color:#c4b5fd;border-color:rgba(139,92,246,0.5);}
.subtitle-row{border-bottom:1px solid rgba(71,85,105,0.3);}
.subtitle-row:hover{background:rgba(30,41,59,0.5);}
.code-block{background:rgba(15,23,42,0.8);border:1px solid rgba(139,92,246,0.2);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#a78bfa;word-break:break-all;}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#334155;border-radius:22px;transition:0.3s;}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
input:checked+.toggle-slider{background:#8b5cf6;}
input:checked+.toggle-slider:before{transform:translateX(18px);}
.replace-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.particle-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;border:1px solid rgba(99,102,241,0.4);background:rgba(99,102,241,0.1);font-size:12px;cursor:pointer;transition:all 0.15s;user-select:none;}
.particle-chip.active{background:rgba(139,92,246,0.35);border-color:#8b5cf6;color:#c4b5fd;}
.particle-chip:hover{border-color:#8b5cf6;}
.edit-input{background:transparent;border:none;outline:none;width:100%;color:#f1f5f9;font-size:0.875rem;resize:none;line-height:1.5;}
.time-input{background:rgba(15,23,42,0.6);border:1px solid rgba(71,85,105,0.4);border-radius:6px;color:#94a3b8;font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;width:96px;outline:none;text-align:center;}
.time-input:focus{border-color:#8b5cf6;color:#e2e8f0;}
.row-btn{padding:3px 7px;border-radius:6px;font-size:11px;transition:all 0.15s;border:1px solid transparent;}
.row-btn:hover{border-color:rgba(139,92,246,0.4);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:rgba(15,23,42,0.5);border-radius:3px;}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#64748b;}
.tab-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:500;transition:all 0.2s;color:#94a3b8;}
.tab-btn.active{background:rgba(139,92,246,0.25);color:#c4b5fd;}
</style>
</head>
<body class="flex flex-col items-center p-4 md:p-8 relative min-h-screen">

<!-- hidden file input, NOT inside drop zone -->
<input type="file" id="file-input" class="hidden" accept=".json,.srt">

<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="blob bg-violet-600 w-96 h-96 top-0 left-1/4 mix-blend-screen animate-pulse"></div>
  <div class="blob bg-purple-700 w-96 h-96 top-1/3 right-1/4 mix-blend-screen animate-pulse" style="animation-delay:2s"></div>
  <div class="blob bg-fuchsia-600 w-80 h-80 bottom-0 left-1/3 mix-blend-screen animate-pulse" style="animation-delay:4s"></div>
</div>

<!-- Lang Switcher -->
<div class="fixed top-4 right-4 z-50 flex gap-1 glass-panel rounded-xl p-1">
  <button class="lang-btn active px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="en">EN</button>
  <button class="lang-btn px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="zh-TW">繁體</button>
  <button class="lang-btn px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 border border-transparent" data-lang="zh-CN">简体</button>
</div>

<main class="w-full max-w-4xl flex flex-col gap-8 z-10 mt-4">

  <!-- Header -->
  <header class="text-center space-y-3">
    <div class="inline-flex items-center justify-center p-4 rounded-2xl glass-panel mb-2 mx-auto">
      <svg class="w-12 h-12" viewBox="0 0 100 100" fill="none"><rect x="8" y="18" width="84" height="64" rx="10" stroke="#8B5CF6" stroke-width="8"/><path d="M22 52 H78" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/><path d="M22 66 H54" stroke="#a78bfa" stroke-width="6" stroke-linecap="round"/><circle cx="74" cy="35" r="10" fill="#EF4444"/><path d="M70 35 L72 38 L78 32" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="ml-4 text-left">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400">CapcutSRT</h1>
        <p class="text-xs text-slate-400 tracking-wider uppercase" data-i18n="tagline"></p>
      </div>
    </div>
    <p class="text-slate-300 max-w-xl mx-auto leading-relaxed text-sm" data-i18n="desc"></p>
  </header>

  <!-- OS Guide -->
  <div id="os-guide" class="glass-panel rounded-2xl p-5 fade-in-up">
    <div class="flex items-start gap-4">
      <div id="os-icon" class="text-3xl shrink-0 mt-0.5"></div>
      <div class="flex-1">
        <p class="text-sm font-semibold text-violet-300 mb-1" data-i18n="osGuideTitle"></p>
        <p class="text-xs text-slate-400 mb-2" data-i18n="osGuideSub"></p>
        <div id="os-path" class="code-block"></div>
        <p class="text-xs text-slate-500 mt-2" data-i18n="osGuideNote"></p>
      </div>
    </div>
  </div>

  <!-- Drop Zone: pure div, no nested input -->
  <div id="drop-zone" class="drop-zone rounded-2xl p-8 md:p-12 text-center select-none">
    <div class="flex flex-col items-center gap-4">
      <div class="p-4 bg-slate-800/50 rounded-full border border-slate-700 transition-all" id="drop-icon-wrap">
        <svg class="w-8 h-8 text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      </div>
      <div>
        <p class="text-lg font-semibold text-white mb-1" data-i18n="dropTitle"></p>
        <p class="text-sm text-slate-400" data-i18n="dropSub"></p>
      </div>
      <button id="browse-btn" class="flex items-center gap-2 px-4 py-2 bg-violet-700/60 hover:bg-violet-600/80 border border-violet-500/40 rounded-xl text-xs font-medium text-violet-200 transition-all active:scale-95">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h3l2 2h7a2 2 0 012 2v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        <span data-i18n="browseBtn"></span>
      </button>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-slate-800/80 rounded-full border border-slate-700">
        <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-xs text-slate-300" data-i18n="dropHint"></span>
      </div>
    </div>
  </div>

  <!-- Tools Panel -->
  <div id="tools-panel" class="hidden glass-panel rounded-2xl overflow-hidden">
    <div class="flex gap-1 px-4 pt-4 border-b border-slate-700/50 pb-3">
      <button class="tab-btn active" data-tab="clean" data-i18n="tabClean"></button>
      <button class="tab-btn" data-tab="particles" data-i18n="tabParticles"></button>
      <button class="tab-btn" data-tab="convert" data-i18n="tabConvert"></button>
      <button class="tab-btn" data-tab="replace" data-i18n="tabReplace"></button>
    </div>
    <div id="tab-clean" class="tab-content p-6 space-y-5">
      <div class="grid md:grid-cols-2 gap-5">
        <div class="flex items-center justify-between"><div><p class="text-sm text-white" data-i18n="removeEmpty"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="removeEmptySub"></p></div><label class="toggle-switch"><input type="checkbox" id="toggle-empty" checked><span class="toggle-slider"></span></label></div>
        <div class="flex items-center justify-between"><div><p class="text-sm text-white" data-i18n="mergeSame"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="mergeSameSub"></p></div><label class="toggle-switch"><input type="checkbox" id="toggle-merge"><span class="toggle-slider"></span></label></div>
        <div class="flex items-center justify-between"><div><p class="text-sm text-white" data-i18n="trimSpaces"></p><p class="text-xs text-slate-500 mt-0.5" data-i18n="trimSpacesSub"></p></div><label class="toggle-switch"><input type="checkbox" id="toggle-trim" checked><span class="toggle-slider"></span></label></div>
        <div><p class="text-sm text-white mb-2" data-i18n="timeOffset"></p><div class="flex items-center gap-2"><input type="number" id="time-offset" value="0" step="0.1" class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-violet-500"><span class="text-xs text-slate-400" data-i18n="seconds"></span></div></div>
      </div>
    </div>
    <div id="tab-particles" class="tab-content hidden p-6">
      <p class="text-xs text-slate-400 mb-4" data-i18n="particlesHint"></p>
      <div id="particle-chips" class="flex flex-wrap gap-2 mb-4"></div>
      <div class="flex items-center gap-3 mt-2">
        <input id="particle-custom" type="text" placeholder="+" class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-violet-500">
        <button id="particle-add-btn" class="text-xs text-violet-400 hover:text-violet-300 transition-colors" data-i18n="addCustomParticle"></button>
      </div>
    </div>
    <div id="tab-convert" class="tab-content hidden p-6">
      <p class="text-xs text-slate-400 mb-4" data-i18n="convertHint"></p>
      <div class="flex flex-wrap gap-3">
        <button onclick="convertScript('s2t')" class="px-4 py-2 bg-amber-600/80 hover:bg-amber-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95" data-i18n="s2t"></button>
        <button onclick="convertScript('t2s')" class="px-4 py-2 bg-sky-600/80 hover:bg-sky-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95" data-i18n="t2s"></button>
      </div>
      <p class="text-xs text-slate-600 mt-3" data-i18n="convertNote"></p>
    </div>
    <div id="tab-replace" class="tab-content hidden p-6">
      <p class="text-sm text-white mb-3" data-i18n="textReplace"></p>
      <div id="replace-list" class="space-y-2 mb-3"></div>
      <button id="add-replace-btn" class="text-xs text-violet-400 hover:text-violet-300 flex items-center gap-1 transition-colors"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg><span data-i18n="addRule"></span></button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-panel" class="hidden flex-col gap-4 fade-in-up">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
      <div class="text-sm text-slate-400">
        <span id="file-name-display" class="text-violet-300 font-medium"></span>&nbsp;·&nbsp;
        <span id="subtitle-count" class="text-white font-bold">0</span>
        <span data-i18n="subtitleLines"></span>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="exportFile('srt')" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5 shadow-lg shadow-violet-900/40"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><span data-i18n="exportSRT"></span></button>
        <button onclick="exportFile('txt')" class="px-4 py-2 bg-fuchsia-600 hover:bg-fuchsia-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><span data-i18n="exportTXT"></span></button>
        <button onclick="exportFile('plain')" class="px-4 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><span data-i18n="exportPlain"></span></button>
        <button onclick="copyAllSubs()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-xs font-medium transition-all active:scale-95 flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span data-i18n="copyAll"></span></button>
        <button onclick="clearAll()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-medium transition-all active:scale-95"><span data-i18n="clearAll"></span></button>
      </div>
    </div>
    <div class="glass-panel rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700/50">
        <span class="text-xs font-medium text-slate-400" data-i18n="preview"></span>
        <span class="text-xs text-slate-500" data-i18n="editorHint"></span>
      </div>
      <div id="preview-list" class="divide-y divide-slate-700/30 max-h-[60vh] overflow-y-auto"></div>
    </div>
  </div>

  <!-- Error -->
  <div id="error-msg" class="hidden glass-panel bg-red-900/20 border-red-500/30 px-5 py-4 rounded-xl text-sm flex items-start gap-3 text-red-200">
    <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div><strong class="block mb-1" data-i18n="errorTitle"></strong><span id="error-text" class="opacity-90"></span></div>
  </div>

</main>

<footer class="mt-12 mb-6 text-center w-full text-slate-600 text-xs z-10">
  <p>CapcutSRT &bull; Client-side Only &bull; Zero Upload &bull; <a href="https://github.com/leohkz/CapcutSRT" class="hover:text-slate-400 transition-colors">GitHub</a></p>
</footer>

<script>

// ============================
const i18n={

const DEFAULT_PARTICLES=[

}

// ============================
// Parsers
// ============================
function parseCapcut(data){
  const subs=[],mats=data.materials||{};
  for(const cb of(mats.subtitle_cache_info||[])){
    for(const s of(cb.sentence_list||cb.sentencelist||cb.sentences||[])){
      const st=s.start_time??s.starttime??null,et=s.end_time??s.endtime??null,tx=s.text??'';
      if(st===null||et===null||!tx.trim())continue;
      subs.push({start:st/1e6,end:et/1e6,text:tx.trim()});
    }
  }
  if(!subs.length){
    const tm={};for(const m of(mats.texts||[]))if(m.id)tm[m.id]=m;
    for(const track of(data.tracks||[])){
      if(track.type!=='text')continue;
      for(const seg of(track.segments||[])){
        const tr=seg.target_timerange||{},st=(tr.start||0)/1e6,dur=(tr.duration||0)/1e6;
        const mat=tm[seg.material_id];let tx='';
        try{const p=typeof(mat||seg).content==='string'?JSON.parse((mat||seg).content):(mat||seg).content;tx=(p&&typeof p.text==='string')?p.text:String((mat||seg).content||'');}catch{tx=String((mat&&(mat.content||mat.text))||'');}
        if(tx.trim())subs.push({start:st,end:st+dur,text:tx.trim()});
      }
    }
  }
  if(!subs.length){
    for(const m of(mats.texts||[])){
      const tr=m.timerange||{},st=(tr.start||0)/1e6,dur=(tr.duration||0)/1e6;let tx='';
      try{const p=typeof m.content==='string'?JSON.parse(m.content):m.content;tx=(p&&typeof p.text==='string')?p.text:String(m.content||m.text||'');}catch{tx=String(m.content||m.text||'');}
      if(tx.trim())subs.push({start:st,end:st+dur,text:tx.trim()});
    }
  }
  return subs.sort((a,b)=>a.start-b.start);
}
function parseSRT(raw){
  const subs=[],blocks=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split(/\n\n+/);
  for(const block of blocks){
    const lines=block.trim().split('\n');if(lines.length<2)continue;
    const tidx=lines.findIndex(l=>/-->/.test(l));if(tidx<0)continue;
    const[ts,te]=lines[tidx].split('-->').map(s=>srtTimeToSec(s.trim()));
    const textLines=lines.slice(tidx+1).filter(l=>l.trim());
    if(textLines.length)subs.push({start:ts,end:te,text:textLines.join(' ')});
  }
  return subs;
}
function srtTimeToSec(s){const m=s.match(/(\d+):(\d+):(\d+)[,\.](\d+)/);if(!m)return 0;return+m[1]*3600+ +m[2]*60+ +m[3]+ +m[4].padEnd(3,'0')/1000;}

// ============================
// applyTools
// ============================
function applyTools(subs){
  const offset=parseFloat(document.getElementById('time-offset').value)||0;
  const doEmpty=document.getElementById('toggle-empty').checked;
  const doMerge=document.getElementById('toggle-merge').checked;
  const doTrim=document.getElementById('toggle-trim').checked;
  const pRe=buildParticleRegex();
  let r=subs.map(s=>({...s,start:Math.max(0,s.start+offset),end:Math.max(0,s.end+offset)}));
  r=r.map(s=>{let tx=s.text;for(const rule of replaceRules)if(rule.find)tx=tx.split(rule.find).join(rule.rep);return{...s,text:tx};});
  if(pRe)r=r.map(s=>({...s,text:s.text.replace(pRe,'').replace(/\s+/g,' ').trim()}));
  if(doTrim)r=r.map(s=>({...s,text:s.text.trim()}));
  if(doEmpty)r=r.filter(s=>s.text.trim().length>0);
  if(doMerge){const m=[];for(const s of r){if(m.length&&m[m.length-1].text===s.text)m[m.length-1].end=s.end;else m.push({...s});}r=m;}
  return r;
}
function toSRTTime(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60),ms=Math.round((sec-Math.floor(sec))*1000);return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;}
function buildSRT(subs){return subs.map((s,i)=>`${i+1}\n${toSRTTime(s.start)} --> ${toSRTTime(s.end)}\n${s.text}`).join('\n\n');}
function buildTXT(subs){return subs.map(s=>`[${toSRTTime(s.start)} --> ${toSRTTime(s.end)}]\n${s.text}`).join('\n\n');}
function buildPlain(subs){return subs.map(s=>s.text).join('\n');}

async function handleFile(file){
  document.getElementById('error-msg').classList.add('hidden');
  try{
    const raw=await file.text();
    const name=file.name.toLowerCase();
    if(name.endsWith('.srt')){
      parsedSubs=parseSRT(raw);
      if(!parsedSubs.length)throw new Error('No valid SRT blocks found.');
    } else {
      const json=JSON.parse(raw);
      parsedSubs=parseCapcut(json);
      if(!parsedSubs.length)throw new Error('No subtitle tracks found. Make sure the project has AI speech-to-text subtitles.');
    }
    currentFileName=file.name.replace(/\.(json|srt)$/i,'');
    document.getElementById('tools-panel').classList.remove('hidden');
    renderParticleChips();
    renderResults();
  }catch(err){
    showError(t('errorBadFile')+(err.message?' ('+err.message+')':''));
  }
}

['toggle-empty','toggle-merge','toggle-trim'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{if(parsedSubs.length)renderResults();}));
document.getElementById('time-offset').addEventListener('input',()=>{if(parsedSubs.length)renderResults();});

window.exportFile=function(type){
  const p=applyTools(parsedSubs),map={srt:[buildSRT(p),'srt'],txt:[buildTXT(p),'txt'],plain:[buildPlain(p),'txt']};
  const[content,ext]=map[type];
  const blob=new Blob(['\uFEFF'+content],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`${currentFileName}.${ext}`;a.click();URL.revokeObjectURL(url);
};
window.copyAllSubs=function(){
  navigator.clipboard.writeText(buildPlain(applyTools(parsedSubs))).then(()=>{
    const btn=document.querySelector('[onclick="copyAllSubs()"]');if(!btn)return;
    const orig=btn.innerHTML;btn.textContent=t('copied');btn.classList.add('bg-green-600');btn.classList.remove('bg-slate-700');
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('bg-green-600');btn.classList.add('bg-slate-700');},1800);
  });
};
window.clearAll=function(){
  parsedSubs=[];currentFileName='subtitles';
  document.getElementById('results-panel').classList.add('hidden');
  document.getElementById('tools-panel').classList.add('hidden');
  document.getElementById('preview-list').innerHTML='';
};
function showError(msg){document.getElementById('error-text').textContent=msg;document.getElementById('error-msg').classList.remove('hidden');}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
